<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Central - Teacher Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        :root {
            --primary: #0f4c5c;
            --primary-dark: #0a3a46;
            --secondary: #e67e22;
            --gold: #f4b942;
        }

        body {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .profile-card {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 3rem;
        }

        .teacher-name {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 0.3rem;
        }

        .teacher-college {
            color: #666;
            margin-bottom: 1rem;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1rem 0;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--secondary);
        }

        .stat-label {
            font-size: 0.7rem;
            color: #666;
        }

        .memory-wall {
            background: white;
            border-radius: 32px;
            padding: 1.5rem;
        }

        .memory-title {
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
        }

        .memory-photo {
            background: #f0f0f0;
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            border: 1px solid #eee;
        }

        .memory-photo img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 0.5rem;
        }

        .memory-caption {
            font-size: 0.7rem;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #999;
        }

        .certificate-btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 1rem;
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .photos-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div class="avatar">👩‍🏫</div>
            <div class="teacher-name" id="teacherName">Prof. Anand Sharma</div>
            <div class="teacher-college" id="teacherCollege">RV College of Engineering</div>
            <div class="stats-row">
                <div class="stat">
                    <div class="stat-number" id="thanksCount">0</div>
                    <div class="stat-label">Thank Yous</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="studentsCount">0</div>
                    <div class="stat-label">Students</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="photosCount">0</div>
                    <div class="stat-label">Memories</div>
                </div>
            </div>
            <button class="certificate-btn" onclick="downloadCertificate()">📄 Download Certificate of Appreciation</button>
        </div>

        <div class="memory-wall">
            <div class="memory-title">
                <i class="fas fa-images"></i> Memory Wall
            </div>
            <div id="photosGrid" class="photos-grid"></div>
        </div>
    </div>

    <script>
        let teacherData = {
            name: "Prof. Anand Sharma",
            college: "RV College of Engineering",
            thanksCount: 8,
            studentsCount: 45,
            photosCount: 12,
            photos: [
                { url: null, caption: "Teacher's Day 2023 - Students surprised me with a cake!" },
                { url: null, caption: "Farewell 2022 - My favorite batch" },
                { url: null, caption: "Annual Day 2023 - Best Teacher Award" }
            ]
        };

        function loadTeacherData() {
            document.getElementById('teacherName').innerText = teacherData.name;
            document.getElementById('teacherCollege').innerText = teacherData.college;
            document.getElementById('thanksCount').innerText = teacherData.thanksCount;
            document.getElementById('studentsCount').innerText = teacherData.studentsCount;
            document.getElementById('photosCount').innerText = teacherData.photosCount;
            renderPhotos();
        }

        function renderPhotos() {
            const container = document.getElementById('photosGrid');
            
            if (teacherData.photos.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-camera"></i><p>No memories yet. Students will upload photos from your surprises here!</p></div>';
                return;
            }
            
            container.innerHTML = teacherData.photos.map(photo => `
                <div class="memory-photo">
                    <div style="background: linear-gradient(135deg, var(--gold), #ffaa00); height: 120px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 3rem;">📸</div>
                    <div class="memory-caption">${escapeHtml(photo.caption)}</div>
                </div>
            `).join('');
        }

        function downloadCertificate() {
            alert("📄 Your certificate is being generated...\n\nThank you for being an amazing teacher!");
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadTeacherData();
    </script>
    <script src="js/auth-guard.js"></script>`n</body>
</html>
