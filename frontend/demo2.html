    function updateSpecializations() {
        const mainCourse = document.getElementById('mainCourse');
        if (!mainCourse) return;
        const mainCourseValue = mainCourse.value;
        const specializationGroup = document.getElementById('specializationGroup');
        const specializationSelect = document.getElementById('specialization');
        if (mainCourseValue && specializations[mainCourseValue]) {
            if (specializationGroup) specializationGroup.style.display = 'block';
            if (specializationSelect) {
                specializationSelect.innerHTML = '<option value="">Select your specialization</option>';
                specializations[mainCourseValue].forEach(spec => {
                    const option = document.createElement('option');
                    option.value = spec.toLowerCase().replace(/ /g, '_');
                    option.textContent = spec;
                    specializationSelect.appendChild(option);
                });
            }
        } else if (mainCourseValue === 'other') {
            if (specializationGroup) specializationGroup.style.display = 'block';
            if (specializationSelect) {
                specializationSelect.innerHTML = '<option value="">Please specify your course</option>';
                specializationSelect.innerHTML += '<option value="other_course">Other Course</option>';
            }
        } else {
            if (specializationGroup) specializationGroup.style.display = 'none';
        }
    }
    
    async function apiCall(endpoint, method, body = null, requiresAuth = false) {
        const headers = { 'Content-Type': 'application/json' };
        if (requiresAuth && authToken) headers['Authorization'] = `Bearer ${authToken}`;
        const options = { method, headers };
        if (body && (method === 'POST' || method === 'PUT' || method === 'PATCH' || method === 'DELETE')) options.body = JSON.stringify(body);
        const response = await fetch(`${API_BASE_URL}${endpoint}`, options);
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || 'Something went wrong');
        return data;
    }
    
    async function signup(full_name, email, whatsapp, password, college, course, specialization) {
        const result = await apiCall('/auth/signup', 'POST', {
            full_name: full_name,
            email: email,
            whatsapp: whatsapp,
            password: password,
            role: "student",
            college: college || "",
            course: course || "",
            specialization: specialization || ""
        });
        authToken = result.access_token;
        localStorage.setItem('authToken', authToken);
        localStorage.setItem('token', authToken);
        currentUser = result.user;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        localStorage.setItem('user', JSON.stringify(currentUser));
        updateUI();
        return result;
    }
    
    async function login(email, password) {
        const result = await apiCall('/auth/login', 'POST', { email, password });
        authToken = result.access_token;
        localStorage.setItem('authToken', authToken);
        localStorage.setItem('token', authToken);
        currentUser = result.user;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        localStorage.setItem('user', JSON.stringify(currentUser));
        updateUI();
        return result;
    }
    
    function logout() {
        authToken = null;
        currentUser = null;
        localStorage.removeItem('authToken');
        localStorage.removeItem('token');
        localStorage.removeItem('currentUser');
        localStorage.removeItem('user');
        updateUI();
        showPage('home');
    }
    
    async function createGroup(teacher_name, college, whatsapp_link, event_date) {
        return await apiCall('/groups/create', 'POST', { teacher_name, college, whatsapp_link, event_date }, true);
    }
    
    async function searchGroupsAPI(teacher_name) {
        return await apiCall(`/groups/search?teacher_name=${encodeURIComponent(teacher_name)}`, 'GET');
    }
    
    async function joinGroup(group_id) {
        return await apiCall('/groups/join', 'POST', { group_id }, true);
    }
    
    async function getMyGroups() {
        return await apiCall('/groups/my-groups', 'GET', null, true);
    }
    
    async function deleteGroup(group_id) {
        return await apiCall('/groups/delete', 'DELETE', { group_id }, true);
    }
    
    async function leaveGroup(group_id) {
        return await apiCall('/groups/leave', 'POST', { group_id }, true);
    }
    
    async function shareSuccessStory(story, author) {
        return await apiCall('/stories/create', 'POST', { story_text: story, author_name: author }, false);
    }
    
    async function loadStats() {
        try {
            const groups = await apiCall('/groups/search?teacher_name=a', 'GET', null, false);
            document.getElementById('statGroups').innerText = groups.groups?.length || 0;
            let totalStudents = 0;
            if (groups.groups) totalStudents = groups.groups.reduce((sum, g) => sum + (g.member_count || 1), 0);
            document.getElementById('statStudents').innerText = totalStudents || 0;
            const uniqueTeachers = new Set();
            if (groups.groups) groups.groups.forEach(g => { if (g.teacher_name) uniqueTeachers.add(g.teacher_name); });
            document.getElementById('statTeachers').innerText = uniqueTeachers.size || 0;
            const uniqueColleges = new Set();
            if (groups.groups) groups.groups.forEach(g => { if (g.college) uniqueColleges.add(g.college); });
            document.getElementById('statColleges').innerText = uniqueColleges.size || 0;
        } catch(e) { console.error('Stats error:', e); }
    }
    
    function updateUI() {
        const authDiv = document.querySelector('.header-buttons');
        const userMenu = document.getElementById('userMenu');
        const nameSpan = document.getElementById('userName');
        
        let user = currentUser;
        if (!user) {
            const storedUser = localStorage.getItem('currentUser') || localStorage.getItem('user');
            if (storedUser) {
                try {
                    user = JSON.parse(storedUser);
                    currentUser = user;
                    authToken = localStorage.getItem('authToken') || localStorage.getItem('token');
                } catch(e) {}
            }
        }
        
        if (user) {
            if (authDiv) authDiv.classList.add('hidden');
            if (userMenu) userMenu.classList.remove('hidden');
            if (nameSpan) nameSpan.innerText = user.full_name || (user.email ? user.email.split('@')[0] : 'User');
        } else {
            if (authDiv) authDiv.classList.remove('hidden');
            if (userMenu) userMenu.classList.add('hidden');
        }
        loadStats();
    }
    
    function showPage(page) {
        let pageId = page;
        if (page === 'signup') pageId = 'signupPage';
        if (page === 'login') pageId = 'loginPage';
        if (page === 'home') pageId = 'homePage';
        if (page === 'groups') pageId = 'groupsPage';
        if (page === 'dashboard') pageId = 'dashboardPage';
        if (page === 'thankteacher') pageId = 'thankteacherPage';
        if (page === 'celebrate') pageId = 'celebratePage';
        
        var pages = ['homePage', 'signupPage', 'loginPage', 'thankteacherPage', 'celebratePage', 'groupsPage', 'dashboardPage'];
        for (var i = 0; i < pages.length; i++) {
            var el = document.getElementById(pages[i]);
            if (el) el.classList.add('hidden');
        }
        var targetPage = document.getElementById(pageId);
        if (targetPage) targetPage.classList.remove('hidden');
        if (pageId === 'dashboardPage') loadDashboard();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function getInviteLink(teacherName, college) {
        const baseUrl = window.location.origin + window.location.pathname;
        return `${baseUrl}?join=${encodeURIComponent(teacherName)}&college=${encodeURIComponent(college || '')}`;
    }
    
    function copyInviteLink(teacherName, college) {
        const link = getInviteLink(teacherName, college);
        navigator.clipboard.writeText(link);

    function addTeacherFriend() {
        const name = document.getElementById('teacherFriendName').value.trim();
        if (!name) {
            alert('Please enter a name');
            return;
        }
        if (teacherFriendsList.includes(name)) {
            alert('Name already added');
            return;
        }
        const amount = Math.floor(Math.random() * (81 - 18 + 1) + 18);
        teacherFriendsList.push(name);
        teacherFriendAmounts.push(amount);
        
        const namesDiv = document.getElementById('teacherNamesList');
        namesDiv.innerHTML += `<div class="group-card" style="margin-bottom:0.5rem;">📌 ${escapeHtml(name)} - ₹${amount}</div>`;
        document.getElementById('teacherFriendName').value = '';
        
        const minAmount = Math.min(...teacherFriendAmounts);
        const minIndex = teacherFriendAmounts.indexOf(minAmount);
        const minName = teacherFriendsList[minIndex];
        
        document.getElementById('teacherAmountResults').innerHTML = `<div class="info-message"><i class="fas fa-chart-line"></i> <strong>Amounts generated:</strong> ${teacherFriendsList.map((n,i) => `${n}: ₹${teacherFriendAmounts[i]}`).join(' | ')}</div>`;
        document.getElementById('teacherLowestDisplay').innerHTML = `<div class="success-msg" style="background:#e8f4f8;"><strong>🎉 Best luck!</strong> ${escapeHtml(minName)} got the lowest amount: <span style="font-size:1.5rem; font-weight:bold;">₹${minAmount}</span><br>You will pay this amount to activate the group!</div>`;
        document.getElementById('teacherPayButton').style.display = 'block';
        document.getElementById('teacherPayButton').innerHTML = `💰 Pay ₹${minAmount} and Activate Group →`;
        pendingTeacherData.amountToPay = minAmount;
    }
    
    async function processTeacherPayment() {
        if (!currentUser) {
            alert('Please login first');
            showPage('login');
            return;
        }
        const upiId = 'campuscentral@okhdfcbank';
        const amount = pendingTeacherData.amountToPay;
        const payUrl = `upi://pay?pa=${upiId}&pn=Campus%20Central&am=${amount}&cu=INR`;
        if (confirm(`Pay ₹${amount} to activate the surprise group for ${pendingTeacherData.teacher_name}?`)) {
            window.location.href = payUrl;
            setTimeout(async () => {
                try {
                    const result = await createGroup(pendingTeacherData.teacher_name, pendingTeacherData.college, '', pendingTeacherData.event_date);
                    const groupId = result.group.id;
                    localStorage.setItem(`group_activated_${groupId}`, 'true');
                    localStorage.setItem(`group_payer_${groupId}`, currentUser.full_name || currentUser.email);
                    localStorage.setItem(`group_type_${groupId}`, 'teacher');
                    localStorage.setItem(`group_details_${groupId}`, JSON.stringify(pendingTeacherData));
                    alert('✅ Payment recorded! Your group is now ACTIVE. Share the invite link with friends!');
                    showPage('dashboard');
                } catch (error) {
                    alert('Group created but payment not recorded. Please contact support.');
                }
            }, 2000);
        }
    }

    function sendMessage(groupId) {
        const input = document.getElementById(`chat-input-${groupId}`);
        const message = input.value.trim();
        if (!message || !currentUser) return;
        
        let messages = JSON.parse(localStorage.getItem(`chat_${groupId}`)) || [];
        messages.push({
            user: currentUser.full_name || currentUser.email,
            text: message,
            time: new Date().toLocaleTimeString()
        });
        localStorage.setItem(`chat_${groupId}`, JSON.stringify(messages));
        input.value = '';
        loadChatMessages(groupId);
    }
    
    function loadChatMessages(groupId) {
        const container = document.getElementById(`chat-messages-${groupId}`);
        if (!container) return;
        let messages = JSON.parse(localStorage.getItem(`chat_${groupId}`)) || [];
        container.innerHTML = messages.map(m => `
            <div class="chat-message">
                <strong>${escapeHtml(m.user)}</strong><br>
                ${escapeHtml(m.text)}
                <small>${m.time}</small>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    async function loadDashboard() {
        if (!currentUser) {
            const dashboardDiv = document.getElementById('myGroupsList');
            if (dashboardDiv) dashboardDiv.innerHTML = '<div class="error-msg">Please login to see your groups.</div>';
            return;
        }
        try {
            const result = await getMyGroups();
            const groups = result.groups || [];
            const dashboardDiv = document.getElementById('myGroupsList');
            if (!dashboardDiv) return;
            if (groups.length === 0) {
                dashboardDiv.innerHTML = '<div class="error-msg">You haven\'t joined any groups yet. <a onclick="showPage(\'groups\')" style="color: var(--secondary); cursor: pointer;">Find a group or event →</a></div>';
                return;
            }
            let html = '';
            for (const group of groups) {
                const isCreator = group.created_by === currentUser?.id;
                const isActivated = localStorage.getItem(`group_activated_${group.id}`) === 'true';
                const payerName = localStorage.getItem(`group_payer_${group.id}`) || 'someone';
                const groupType = localStorage.getItem(`group_type_${group.id}`) || 'teacher';
                const details = JSON.parse(localStorage.getItem(`group_details_${group.id}`) || '{}');
                const displayName = groupType === 'teacher' ? group.teacher_name : (details.title || group.teacher_name);
                const icon = groupType === 'teacher' ? '📖' : '🎉';
                
                html += `<div class="group-card">`;
                html += `<div class="group-header">`;
                html += `<div><h3>${icon} ${escapeHtml(displayName)} ${isCreator ? '<span class="organizer-badge">👑 ORGANIZER</span>' : ''}</h3>`;
                html += `<p>🏛️ ${group.college || 'Various locations'}</p>`;
                html += `<p>👥 ${group.member_count || 1} members</p>`;
                if (isActivated) {
                    html += `<p><i class="fas fa-check-circle" style="color:#2ecc71;"></i> Activated by ${escapeHtml(payerName)}</p>`;
                } else {
                    html += `<p><i class="fas fa-lock" style="color:#e67e22;"></i> Not yet activated - need payment</p>`;
                }
                
                if (details.venue) html += `<p>📍 Venue: ${escapeHtml(details.venue)}</p>`;
                if (details.event_date) html += `<p>📅 Date: ${escapeHtml(details.event_date)}</p>`;
                if (details.pet_names) html += `<p>🥰 Pet names: ${escapeHtml(details.pet_names)}</p>`;
                if (details.secret_code) html += `<p>🤫 Secret code: ${escapeHtml(details.secret_code)}</p>`;
                if (details.dress_code) html += `<p>👕 Dress code: ${escapeHtml(details.dress_code)}</p>`;
                if (details.memory) html += `<p>💭 Memory: "${escapeHtml(details.memory)}"</p>`;
                if (details.note) html += `<p>💌 Note: ${escapeHtml(details.note)}</p>`;
                html += `</div></div>`;
                
                if (isActivated) {
                    html += `<div class="invite-link" style="margin-top:0.5rem;">`;
                    html += `<span>🔗 Invite Link:</span>`;
                    html += `<button class="btn-secondary" onclick="copyInviteLink('${escapeHtml(displayName)}', '${escapeHtml(group.college || '')}')">Copy Link</button>`;
                    html += `</div>`;
                    
                    html += `<div class="chat-container">`;
                    html += `<div class="chat-messages" id="chat-messages-${group.id}"></div>`;
                    html += `<div class="chat-input-area">`;
                    html += `<input type="text" id="chat-input-${group.id}" placeholder="Share your ideas, plans, or contact number...">`;
                    html += `<button onclick="sendMessage(${group.id})">Send</button>`;
                    html += `</div></div>`;
                } else {
                    html += `<div class="invite-link" style="margin-top:0.5rem; background:#ffe0e0;">`;
                    html += `<span>🔒 Group not yet activated. First member needs to pay to unlock chat and invites.</span>`;
                    html += `</div>`;
                }
                
                html += `<div class="group-actions" style="margin-top:1rem;">`;
                html += `${isCreator ? `<button class="btn-secondary" onclick="deleteGroupHandler('${group.id}')">Delete Group</button>` : `<button class="btn-secondary" onclick="leaveGroupHandler('${group.id}')">Leave Group</button>`}`;
                if (!isActivated && isCreator) {
                    if (groupType === 'teacher') {
                        html += `<button class="btn-primary" onclick="showThankTeacher()">💰 Pay to Activate (₹18-₹81)</button>`;
                    } else {
                        html += `<button class="btn-primary" onclick="showCelebrateTogether()">💰 Pay to Activate (₹36-₹63)</button>`;
                    }
                }
                html += `</div></div>`;
            }
            dashboardDiv.innerHTML = html;
            
            for (const group of groups) {
                const isActivated = localStorage.getItem(`group_activated_${group.id}`) === 'true';
                if (isActivated) {
                    loadChatMessages(group.id);
                }
            }
        } catch (error) {
            const dashboardDiv = document.getElementById('myGroupsList');
            if (dashboardDiv) dashboardDiv.innerHTML = `<div class="error-msg">Error: ${error.message}</div>`;
        }
    }
    
    async function searchGroups() {
        const searchInput = document.getElementById('searchTeacherInput');
        if (!searchInput) return;
        const searchTerm = searchInput.value.trim();
        const resultsDiv = document.getElementById('searchResults');
        if (!resultsDiv) return;
        if (!searchTerm) {
            resultsDiv.innerHTML = '<div class="error-msg">Enter a teacher name or event title.</div>';
            return;
        }
        try {
            const result = await searchGroupsAPI(searchTerm);
            const groups = result.groups || [];
            if (groups.length === 0) {
                resultsDiv.innerHTML = `<div class="error-msg">No groups found. <a onclick="showThankTeacher()" style="color: var(--secondary); cursor: pointer;">Create one →</a></div>`;
                return;
            }
            let html = '<h3>🎁 Groups & Events Found:</h3>';
            for (const group of groups) {
                const isActivated = localStorage.getItem(`group_activated_${group.id}`) === 'true';
                const groupType = localStorage.getItem(`group_type_${group.id}`) || 'teacher';
                const details = JSON.parse(localStorage.getItem(`group_details_${group.id}`) || '{}');
                const displayName = groupType === 'teacher' ? group.teacher_name : (details.title || group.teacher_name);
                const icon = groupType === 'teacher' ? '📖' : '🎉';
                const statusIcon = isActivated ? '✅' : '⏳';
                const statusText = isActivated ? 'Active - You can join!' : 'Awaiting activation';
                const statusColor = isActivated ? '#2ecc71' : '#e67e22';
                
                html += `<div class="group-card"><div><h3>${icon} ${escapeHtml(displayName)}</h3><p>🏛️ ${group.college || 'Various locations'}</p><p>👥 ${group.member_count || 1} members</p><p><span style="color:${statusColor};">${statusIcon} ${statusText}</span></p></div><div><button class="btn-primary" onclick="joinGroupHandler('${group.id}')" ${!isActivated ? 'disabled style="opacity:0.5;"' : ''}>${isActivated ? 'Join →' : 'Waiting for Activation'}</button></div></div>`;
            }
            resultsDiv.innerHTML = html;
        } catch (error) {
            resultsDiv.innerHTML = `<div class="error-msg">Error: ${error.message}</div>`;
        }
    }
    
    async function joinGroupHandler(groupId) {
        if (!currentUser) { alert('Please login first'); showPage('login'); return; }
        try {
            await joinGroup(groupId);
            alert('🤫 You joined the group/event!');
            searchGroups();
            loadDashboard();
        } catch (error) { alert(error.message); }
    }
    
    async function deleteGroupHandler(groupId) {
        if (confirm('Are you sure? This will remove the group for everyone.')) {
            try {
                await deleteGroup(groupId);
                alert('Group deleted.');
                loadDashboard();
            } catch (error) { alert(error.message); }
        }
    }
    
    async function leaveGroupHandler(groupId) {
        if (confirm('Are you sure you want to leave this group?')) {
            try {
                await leaveGroup(groupId);
                alert('You left the group.');
                loadDashboard();
            } catch (error) { alert(error.message); }
        }
    }
    
    function checkJoinLink() {
        const urlParams = new URLSearchParams(window.location.search);
        const joinTerm = urlParams.get('join');
        if (joinTerm) {
            setTimeout(() => {
                const searchInput = document.getElementById('searchTeacherInput');
                if (searchInput) {
                    searchInput.value = joinTerm;
                    showPage('groups');
                    searchGroups();
                }
            }, 500);
        }
    }
    
    // Event Listeners
    const successStoryForm = document.getElementById('successStoryForm');
    if (successStoryForm) {
        successStoryForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const story = document.getElementById('successStory').value;
            const author = document.getElementById('storyAuthor').value;
            if (story && author) {
                try {
                    await shareSuccessStory(story, author);
                    const storyResult = document.getElementById('storyResult');
                    if (storyResult) {
                        storyResult.innerHTML = '<div class="success-msg">Thank you for sharing! 💛</div>';
                    }
                    document.getElementById('successStory').value = '';
                    document.getElementById('storyAuthor').value = '';
                    setTimeout(() => {
                        if (storyResult) storyResult.innerHTML = '';
                    }, 3000);
                } catch(error) {
                    alert('Failed to share story. Please try again.');
                }
            } else {
                alert('Please fill both fields');
            }
        });
    }
    
    // Check for saved user on load
    const savedUser = localStorage.getItem('currentUser') || localStorage.getItem('user');
    if (savedUser) {
        try {
            currentUser = JSON.parse(savedUser);
            authToken = localStorage.getItem('authToken') || localStorage.getItem('token');
            updateUI();
            if (currentUser) loadDashboard();
        } catch(e) { console.error('Failed to parse saved user'); }
    }
    updateUI();
    checkJoinLink();
    
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(error => console.log('Service Worker registration failed:', error));
        });
    }
</script>
